name: AI Translation Pipeline

on:
  push:
    paths:
      - 'input/**' # Chỉ chạy khi có thay đổi trong thư mục input

jobs:
  run-translation:
    runs-on: ubuntu-latest
    # Cấp quyền cho GitHub Action để nó có thể push file output ngược lại repo
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai pandas

      - name: Execute Translation Script
        env:
          # Lấy API Key từ Secrets bạn đã cài ở bước trước
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/main.py

      - name: Commit and Push results
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Kiểm tra nếu có file mới trong output thì mới commit
          git add output/
          git commit -m "AI: Updated translation $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push
